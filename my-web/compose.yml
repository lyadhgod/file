name: file_my-web

services:
  s3:
    image: luofuxiang/local-s3:2.4
    restart: unless-stopped
    volumes:
      - s3-data:/data
    ports:
      - "8000:80"
      
  redis:
    image: redis:8.6.2-alpine3.23
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6002:6379"

  redisinsight:
    image: redis/redisinsight:3.2.0
    restart: unless-stopped
    ports:
      - "6003:5540"
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
    depends_on:
      - redis
    
  postgres:
    image: postgres:17.9-alpine3.23
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
      - "4004:5432"

  adminer:
    image: adminer:5.4.2
    restart: unless-stopped
    ports:
      - "4005:8080"
    depends_on:
      - postgres

volumes:
  postgres-data:
  redis-data:
  s3-data:
